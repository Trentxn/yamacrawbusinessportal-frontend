services:
  nginx:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./nginx/proxy.conf:/etc/nginx/conf.d/default.conf:ro
      - uploads_data:/var/uploads:ro
    depends_on:
      - frontend
      - api
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    expose:
      - "3000"
    restart: unless-stopped

  api:
    build:
      context: ../yamacrawbusinessportal-api
      dockerfile: Dockerfile
    expose:
      - "8000"
    env_file:
      - ../yamacrawbusinessportal-api/.env
    volumes:
      - uploads_data:/var/uploads
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: yamacraw
      POSTGRES_PASSWORD: yamacraw_dev
      POSTGRES_DB: yamacraw_portal
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U yamacraw"]
      interval: 5s
      timeout: 3s
      retries: 10
    expose:
      - "5432"
    restart: unless-stopped

volumes:
  postgres_data:
  uploads_data:
