services:
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/prod.conf:/etc/nginx/conf.d/default.conf:ro
      - uploads_data:/var/uploads:ro
    depends_on:
      - frontend
      - api
    restart: unless-stopped
    networks:
      - app

  frontend:
    image: ghcr.io/trentxn/yamacrawbusinessportal-frontend:latest
    expose:
      - "3000"
    restart: unless-stopped
    networks:
      - app

  api:
    image: ghcr.io/trentxn/yamacrawbusinessportal-api:latest
    expose:
      - "8000"
    env_file:
      - .env.prod
    volumes:
      - uploads_data:/var/uploads
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - app

  postgres:
    image: postgres:16-alpine
    env_file:
      - .env.prod
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-yamacraw}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-yamacraw_portal}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-yamacraw}"]
      interval: 5s
      timeout: 5s
      retries: 5
    expose:
      - "5432"
    restart: unless-stopped
    networks:
      - app

volumes:
  postgres_data:
  uploads_data:

networks:
  app:
    driver: bridge
